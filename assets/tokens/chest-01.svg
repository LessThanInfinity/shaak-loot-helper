<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280">
  <defs>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
    </radialGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="140" cy="150" rx="120" ry="110" fill="rgba(0,0,0,0.15)"/>
  <!-- Chest body -->
  <rect x="50" y="70" width="180" height="120" rx="8" fill="#8B6914"/>
  <rect x="50" y="70" width="180" height="120" rx="8" fill="url(#shadow)"/>
  <!-- Chest lid -->
  <rect x="45" y="60" width="190" height="50" rx="10" fill="#A0791A"/>
  <!-- Metal bands -->
  <rect x="48" y="105" width="184" height="8" rx="2" fill="#B8860B" opacity="0.6"/>
  <rect x="48" y="155" width="184" height="8" rx="2" fill="#B8860B" opacity="0.6"/>
  <!-- Lid line -->
  <line x1="50" y1="110" x2="230" y2="110" stroke="#654A0E" stroke-width="2"/>
  <!-- Lock/clasp -->
  <rect x="125" y="100" width="30" height="25" rx="4" fill="#DAA520"/>
  <circle cx="140" cy="117" r="5" fill="#654A0E"/>
  <!-- Lid highlight -->
  <rect x="60" y="68" width="160" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
</svg>
