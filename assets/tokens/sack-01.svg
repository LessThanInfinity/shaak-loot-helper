<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280">
  <!-- Shadow -->
  <ellipse cx="140" cy="155" rx="100" ry="95" fill="rgba(0,0,0,0.12)"/>
  <!-- Sack body (organic, lumpy shape) -->
  <path d="M90,80 Q60,120 70,170 Q80,230 140,230 Q200,230 210,170 Q220,120 190,80 Z"
        fill="#C4A86C"/>
  <!-- Fabric folds/wrinkles -->
  <path d="M100,120 Q130,130 120,170" stroke="#A08850" stroke-width="2" fill="none"/>
  <path d="M170,110 Q160,140 175,175" stroke="#A08850" stroke-width="2" fill="none"/>
  <path d="M130,160 Q145,180 160,165" stroke="#A08850" stroke-width="2" fill="none"/>
  <!-- Tied top -->
  <path d="M110,85 Q120,60 140,55 Q160,60 170,85" fill="#B89B5E"/>
  <!-- Rope tie -->
  <ellipse cx="140" cy="80" rx="30" ry="8" fill="none" stroke="#8B7332" stroke-width="3"/>
  <!-- Rope knot -->
  <circle cx="140" cy="72" r="6" fill="#8B7332"/>
  <!-- Top gathered fabric -->
  <path d="M125,55 Q130,40 140,38 Q150,40 155,55" fill="#D4BA7A"/>
  <!-- Highlight -->
  <path d="M100,110 Q120,100 110,140" stroke="rgba(255,255,255,0.15)" stroke-width="6" fill="none"/>
</svg>
